name: "03_post_processing"

on:
  workflow_run:
    workflows: ["02_game_miner"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: pipeline-03-post-processing
  cancel-in-progress: true

jobs:
  post-processing:
    runs-on: ubuntu-latest

    # Nur laufen wenn Vorgänger erfolgreich war ODER manuell getriggert
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout repo (vollständige History für Push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Kein Chrome nötig – post_processing.py nutzt nur pandas
      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install "pandas>=2.0"

      # Gebündelte Artefakte (fminer + game_miner) vom Vorgänger herunterladen
      - name: Download pipeline results (fminer + game_miner)
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: pipeline-step2-results
          path: results/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Fallback für manuellen Dispatch: committete CSVs aus dem Repo nutzen
      - name: Fallback – use repo CSVs (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p results/fminer results/game_miner
          if [ -f results/oefb_links_gesamt.csv ]; then
            cp results/oefb_links_gesamt.csv results/fminer/oefb_links_gesamt.csv
          fi
          if [ -f results/spiel_infos.csv ]; then
            cp results/spiel_infos.csv results/game_miner/spiel_infos.csv
          else
            echo "::error::results/spiel_infos.csv nicht im Repo gefunden. Bitte zuerst 01_fminer und 02_game_miner ausführen."
            exit 1
          fi

      - name: Prepare output folder
        run: mkdir -p results/post_processing

      - name: Run post_processing.py
        run: |
          set -e
          python post_processing.py \
            --in results/game_miner/spiel_infos.csv \
            --out results/post_processing

      # Dateien an die getrackten Repo-Pfade kopieren
      - name: Stage generated files
        run: |
          set -e
          cp -f results/fminer/oefb_links_gesamt.csv              results/oefb_links_gesamt.csv
          cp -f results/game_miner/spiel_infos.csv                results/spiel_infos.csv
          cp -f results/post_processing/martiballtermine_wien.csv results/martiballtermine_wien.csv

      - name: Show outputs (debug)
        run: |
          echo "=== results tree ==="
          find results -maxdepth 2 -type f -print

      # Commit & Push nur, wenn sich etwas geändert hat
      - name: Commit and push CSVs (rebase-safe)
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add results/oefb_links_gesamt.csv results/spiel_infos.csv results/martiballtermine_wien.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update generated CSVs [skip ci]"

          BRANCH="${{ github.ref_name }}"
          git fetch origin "$BRANCH"

          if ! git rebase "origin/$BRANCH"; then
            echo "Rebase-Konflikt – fallback auf Merge mit 'ours'-Strategie."
            git rebase --abort || true
            git pull --no-edit -X ours origin "$BRANCH"
          fi

          git push

      - name: Upload artifact (daily-results)
        uses: actions/upload-artifact@v4
        with:
          name: daily-results
          path: results/
          retention-days: 7
